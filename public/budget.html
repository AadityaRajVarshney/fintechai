<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>FinAI Budget</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- GOOGLE FONTS -->

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- REMIX ICONS -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
  >

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <div class="app-container">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <div class="logo-section">

        <div class="logo-icon">

          <i class="ri-line-chart-line"></i>

        </div>

        <div>

          <h1>FinAI</h1>

          <p>
            Smart Finance Manager
          </p>

        </div>

      </div>

      <nav class="nav-links">

        <a
          href="index.html"
          class="nav-item"
        >
          <i class="ri-home-5-line"></i>
          <span>Home</span>
        </a>

        <a
          href="statistics.html"
          class="nav-item"
        >
          <i class="ri-pie-chart-line"></i>
          <span>Statistics</span>
        </a>

        <a
          href="budget.html"
          class="nav-item active"
        >
          <i class="ri-wallet-3-line"></i>
          <span>Budget</span>
        </a>

      </nav>

      <div class="sidebar-bottom">

        <div class="ai-card">

          <h3>
            <i class="ri-sparkling-2-line"></i>
            AI Budget Tips
          </h3>

          <p>
            Smart recommendations based on your
            spending patterns.
          </p>

        </div>

      </div>

    </aside>

    <!-- MAIN CONTENT -->

    <main class="main-content">

      <!-- TOPBAR -->

      <header class="topbar">

        <div>

          <h2 class="page-title">
            Budget Planner
          </h2>

          <p class="page-subtitle">
            Plan and manage your monthly finances
          </p>

        </div>

        <button
          id="themeToggle"
          class="theme-toggle"
        >
          <i class="ri-moon-line"></i>
        </button>

      </header>

      <!-- OVERVIEW CARDS -->

      <section class="overview-grid">

        <!-- MONTHLY BUDGET -->

        <div
  class="overview-card editable-budget-card"
  id="openBudgetModal"
>

          <div class="overview-icon income">

            <i class="ri-wallet-3-line"></i>

          </div>

          <div>

            <p>
              Monthly Budget
            </p>

            <h2 id="monthlyBudget">
              ₹0
            </h2>

          </div>
<i class="ri-edit-2-line edit-budget-icon"></i>
        </div>

        <!-- REMAINING BUDGET -->

        <div class="overview-card">

          <div class="overview-icon expense">

            <i class="ri-funds-line"></i>

          </div>

          <div>

            <p>
              Remaining Budget
            </p>

            <h2 id="remainingBudget">
              ₹0
            </h2>

          </div>

        </div>

      </section>

      <!-- BUDGET GRID -->

      <section class="charts-grid">

        <!-- BUDGET USAGE -->

        <div class="chart-card budget-full-width">

          <div class="card-header">

            <h3>
              Budget Usage
            </h3>

            <i class="ri-bar-chart-box-line"></i>

          </div>

          <!-- DYNAMIC INJECTION POINT -->

          <div id="budgetUsageContainer">

          </div>

        </div>



      </section>

    </main>

  </div>

  <!-- CHART JS -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- MAIN JS -->

  <script src="js/script.js"></script>

</body>
<!-- BUDGET MODAL -->

<div class="budget-modal" id="budgetModal">

  <div class="budget-modal-content">

    <div class="budget-modal-header">

      <h2>
        Update Monthly Budget
      </h2>

      <button id="closeBudgetModal">

        <i class="ri-close-line"></i>

      </button>

    </div>

    <div class="budget-modal-body">

      <label>
        Monthly Budget Amount
      </label>

      <div class="budget-input-wrapper">

        <span>₹</span>

        <input
          type="number"
          id="budgetInput"
          placeholder="50000"
          max="99999999"
        >

      </div>

      <button id="saveBudgetBtn">

        Save Budget

      </button>

    </div>

  </div>

</div>
</html>
